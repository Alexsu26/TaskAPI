services:
  postgres:
    image: postgres:16
    container_name: taskapi-database
    restart: unless-stopped
    environment:
      - POSTGRES_USER=taskapi
      - POSTGRES_PASSWORD=taskapi
      - POSTGRES_DB=taskapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: